name: Sync openclash and passwall 

on:
  # schedule:
  #   - cron: "0 0 * * *"   # 每天 0 点运行
  workflow_dispatch:       # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出当前仓库
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 配置 Git
      - name: Configure Git
        run: |
          git config --global user.name "hztbhtbh"
          git config --global user.email "hztbhtbh@hotmail.com"

      # 3. 检测 OpenClash 上游仓库（改为指定版本）
      - name: Checkout OpenClash upstream
        uses: actions/checkout@v4
        with:
          repository: vernesong/OpenClash
          ref: v0.47.088
          path: upstream-openclash
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # 4. 检测 Passwall 上游仓库（改为指定版本）
      - name: Checkout Passwall upstream
        uses: actions/checkout@v4
        with:
          repository: Openwrt-Passwall/openwrt-passwall
          ref: 26.5.3-1
          path: upstream-passwall
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # 5. 复制目录
      - name: Copy target directories
        run: |
          rm -rf luci-app-openclash luci-app-passwall
          cp -r upstream-openclash/luci-app-openclash ./luci-app-openclash
          cp -r upstream-passwall/luci-app-passwall ./luci-app-passwall

      # 6. 提交并推送（动态时间）
      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add luci-app-openclash luci-app-passwall
          if git diff --cached --quiet; then
            echo "No changes detected, skip commit"
            exit 0
          fi

          TIME=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')

          git commit -m "update ${TIME}"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}
